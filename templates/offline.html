{% extends "base.html" %}

{% block title %}Offline - ExpenseFlow{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5 text-center">
            <div class="fintech-card p-5">
                <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-4"
                     style="width: 80px; height: 80px; background: var(--primary-light); color: var(--primary); font-size: 2rem;">
                    <i class="fas fa-wifi-slash"></i>
                </div>
                <h2 class="fw-bold mb-2">You're Offline</h2>
                <p class="text-secondary mb-4">
                    It looks like you've lost your internet connection. Don't worry — your data is safe. 
                    Please check your connection and try again.
                </p>
                <button onclick="window.location.reload()" class="btn btn-primary rounded-pill px-4">
                    <i class="fas fa-redo me-2"></i>Try Again
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
