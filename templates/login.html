{% extends "base.html" %}

{% block title %}Login - SpendWise{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card glass-effect">
        <div class="auth-header">
            <div class="auth-icon">
                <i class="fas fa-sign-in-alt"></i>
            </div>
            <h1>Welcome Back</h1>
            <p>Sign in to your account to continue tracking your expenses</p>
        </div>

        <form method="POST" id="loginForm" class="auth-form">
            <div class="form-group floating-label">
                <input type="text" id="username" name="username" class="form-input" required>
                <label for="username">
                    <i class="fas fa-user"></i>
                    <span>Username or Email</span>
                </label>
            </div>

            <div class="form-group floating-label password-group">
                <input type="password" id="password" name="password" class="form-input" required>
                <label for="password">
                    <i class="fas fa-lock"></i>
                    <span>Password</span>
                </label>
                <button type="button" class="password-toggle" onclick="togglePassword('password')">
                    <i class="fas fa-eye" id="toggleIcon"></i>
                </button>
            </div>

            <button type="submit" class="btn-auth">
                <span class="btn-text">Sign In</span>
                <div class="spinner" id="loginSpinner" style="display: none;">
                    <div class="spinner-border spinner-border-sm" role="status"></div>
                </div>
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Create one now</a></p>
            <a href="{{ url_for('index') }}" class="back-link">
                <i class="fas fa-arrow-left"></i> Back to Home
            </a>
        </div>
    </div>
</div>

<script>
function togglePassword(fieldId) {
    const field = document.getElementById(fieldId);
    const icon = document.getElementById('toggleIcon');
    
    if (field.type === 'password') {
        field.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        field.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

document.getElementById('loginForm').addEventListener('submit', function() {
    const submitBtn = this.querySelector('.btn-auth');
    const btnText = submitBtn.querySelector('.btn-text');
    const spinner = document.getElementById('loginSpinner');
    
    submitBtn.disabled = true;
    btnText.style.display = 'none';
    spinner.style.display = 'flex';
    
    // Re-enable after 3 seconds (or use real loading state)
    setTimeout(() => {
        submitBtn.disabled = false;
        btnText.style.display = 'block';
        spinner.style.display = 'none';
    }, 3000);
});
</script>

<style>
.auth-container {
    min-height: calc(100vh - 70px);
    display: flex;
    align-items: center;
    justify-content: center;
    background: transparent;
    padding: 2rem;
    position: relative;
    overflow: hidden;
}

.auth-container::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.05)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
    pointer-events: none;
}

.auth-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(20px);
    border: 1px solid #e2e8f0;
    border-radius: 24px;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
    padding: 3rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    animation: slideUp 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.glass-effect::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
}

.auth-icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
}

.auth-icon i {
    font-size: 2.5rem;
    color: white;
}

.auth-header h1 {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1a202c;
    margin-bottom: 0.5rem;
}

.auth-header p {
    color: #64748b;
    font-size: 1rem;
    line-height: 1.5;
}

.form-input {
    position: relative;
    width: 100%;
}

.floating-label {
    position: relative;
}

.floating-label input {
    padding: 1.2rem 1rem 0.5rem;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    background: #ffffff;
    backdrop-filter: blur(10px);
    color: #1a202c;
    font-size: 1rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.floating-label input::placeholder {
    color: transparent;
}

.floating-label label {
    position: absolute;
    left: 1rem;
    top: 1.2rem;
    color: #64748b;
    font-size: 1rem;
    font-weight: 500;
    pointer-events: none;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex;
    align-items: center;
}

.floating-label input:focus + label,
.floating-label input:not(:placeholder-shown) + label {
    top: 0.5rem;
    font-size: 0.85rem;
    color: #667eea;
}

.floating-label input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.15);
    background: rgba(255, 255, 255, 0.2);
}

.password-group {
    position: relative;
}

.password-toggle {
    position: absolute;
    right: 1rem;
    top: 1.1rem;
    background: none;
    border: none;
    color: #94a3b8;
    cursor: pointer;
    transition: color 0.3s ease;
    z-index: 2;
}

.password-toggle:hover {
    color: #667eea;
}

.btn-auth {
    position: relative;
    overflow: hidden;
    padding: 1.2rem;
    background: linear-gradient(45deg, #667eea, #764ba2);
    border: none;
    border-radius: 12px;
    color: white;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.btn-auth:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(102, 126, 234, 0.4);
}

.btn-auth:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

.spinner {
    align-items: center;
    gap: 0.5rem;
}

.spinner-border {
    width: 1.2rem;
    height: 1.2rem;
}

.auth-footer {
    margin-top: 2.5rem;
}

.auth-footer p {
    color: #64748b;
    margin-bottom: 1rem;
    text-align: center;
}

.auth-footer a {
    color: #667eea;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.3s ease;
}

.auth-footer a:hover {
    color: #764ba2;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@media (max-width: 480px) {
    .auth-card {
        margin: 1rem;
        padding: 2rem;
    }
    
    .auth-container {
        padding: 1rem;
    }
}
</style>
{% endblock %}
