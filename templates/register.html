{% extends "base.html" %}

{% block title %}Create Account - ExpenseFlow{% endblock %}

{% block content %}
<div class="container py-5 mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="fintech-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 64px; height: 64px; font-size: 1.75rem;">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Create Account</h2>
                    <p class="text-secondary">Join ExpenseFlow today</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label"><i class="fas fa-user text-muted me-2"></i>Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Choose a username">
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label"><i class="fas fa-envelope text-muted me-2"></i>Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="name@example.com">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label"><i class="fas fa-lock text-muted me-2"></i>Password</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Create a password">
                    </div>

                    <div class="mb-4">
                        <label for="confirm_password" class="form-label"><i class="fas fa-check-circle text-muted me-2"></i>Confirm Password</label>
                        <input type="password" class="form-control" id="confirm_password" name="confirm_password" required placeholder="Repeat your password">
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Create Account</button>
                    </div>
                </form>

                <div class="text-center">
                    <p class="text-secondary mb-0">Already have an account? <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none hover-primary">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
