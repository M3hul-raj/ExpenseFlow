{% extends "base.html" %}

{% block title %}Set Budget - ExpenseFlow{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-xl-6">

            <!-- Page Header -->
            <div class="d-flex align-items-center mb-4">
                <a href="{{ url_for('dashboard') }}" class="btn btn-light btn-sm rounded-pill me-3">
                    <i class="fas fa-arrow-left me-1"></i>Back
                </a>
                <div>
                    <h2 class="fw-bold mb-0" style="font-size: 1.4rem;"><i class="fas fa-wallet text-primary me-2"></i>Set Monthly Budget</h2>
                    <p class="text-secondary small mb-0">Control your spending with a monthly limit</p>
                </div>
            </div>

            <!-- Current Budget Info Banner -->
            <div class="fintech-card mb-4" style="border-left: 4px solid var(--primary);">
                <div class="d-flex align-items-center gap-3">
                    <div class="d-inline-flex align-items-center justify-content-center rounded-circle bg-primary bg-opacity-10 text-primary" style="width: 48px; height: 48px; font-size: 1.2rem; flex-shrink: 0;">
                        <i class="fas fa-info-circle"></i>
                    </div>
                    <div>
                        <p class="fw-bold mb-0" style="color: var(--text-primary);">Current budget: <span style="color: var(--primary);">₹{{ "%.2f"|format(current_budget) }}</span></p>
                        <p class="text-secondary small mb-0">Update it below for any month and year</p>
                    </div>
                </div>
            </div>

            <!-- Budget Form -->
            <div class="fintech-card">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <!-- Month -->
                        <div class="col-sm-6">
                            <label for="month" class="form-label"><i class="fas fa-calendar-alt text-muted me-2"></i>Month</label>
                            <select class="form-select" id="month" name="month" required>
                                <option value="">Select month…</option>
                                {% for num, name in [('01','January'),('02','February'),('03','March'),('04','April'),('05','May'),('06','June'),('07','July'),('08','August'),('09','September'),('10','October'),('11','November'),('12','December')] %}
                                <option value="{{ num }}" {% if num == current_month %}selected{% endif %}>{{ name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <!-- Year -->
                        <div class="col-sm-6">
                            <label for="year" class="form-label"><i class="fas fa-calendar text-muted me-2"></i>Year</label>
                            <select class="form-select" id="year" name="year" required>
                                <option value="">Select year…</option>
                                {% for y in range(current_year - 1, current_year + 3) %}
                                <option value="{{ y }}" {% if y == current_year %}selected{% endif %}>{{ y }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <!-- Amount -->
                        <div class="col-12">
                            <label for="budget" class="form-label"><i class="fas fa-rupee-sign text-muted me-2"></i>Budget Amount (₹)</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" id="budget" name="budget"
                                   value="{{ "%.2f"|format(current_budget) }}" placeholder="Enter amount…" required>
                        </div>
                        <!-- Recurring -->
                        <div class="col-12">
                            <div class="fintech-card p-3" style="background: var(--bg-color); border: 1px dashed var(--border-color);">
                                <div class="form-check d-flex align-items-center gap-2 mb-0">
                                    <input class="form-check-input mt-0" type="checkbox" name="recurring" id="recurring" value="1" style="width: 1.1rem; height: 1.1rem; accent-color: var(--primary);">
                                    <label class="form-check-label fw-500" for="recurring">
                                        <i class="fas fa-sync-alt text-primary me-2"></i>
                                        <strong>Set as recurring monthly budget</strong>
                                        <span class="d-block text-secondary small mt-1">Automatically apply this amount to future months</span>
                                    </label>
                                </div>
                            </div>
                        </div>
                        <!-- Submit -->
                        <div class="col-12 pt-1">
                            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2">
                                <i class="fas fa-save me-2"></i>Save Budget
                            </button>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
