{% extends "base.html" %}

{% block title %}Sign In - ExpenseFlow{% endblock %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6 col-xl-5">
            <div class="fintech-card p-4 p-md-5">
                <div class="text-center mb-4">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary bg-opacity-10 text-primary rounded-circle mb-3" style="width: 64px; height: 64px; font-size: 1.75rem;">
                        <i class="fas fa-sign-in-alt"></i>
                    </div>
                    <h2 class="fw-bold mb-1">Welcome Back</h2>
                    <p class="text-secondary">Sign in to your account</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label"><i class="fas fa-user text-muted me-2"></i>Username</label>
                        <input type="text" class="form-control" id="username" name="username" required autofocus placeholder="Enter your username">
                    </div>
                    
                    <div class="mb-4">
                        <label for="password" class="form-label"><i class="fas fa-lock text-muted me-2"></i>Password</label>
                        <input type="password" class="form-control" id="password" name="password" required placeholder="Enter your password">
                    </div>

                    <div class="d-grid gap-2 mb-4">
                        <button type="submit" class="btn btn-primary btn-lg rounded-pill">Sign In</button>
                    </div>
                </form>

                <div class="text-center">
                    <p class="text-secondary mb-0">Don't have an account? <a href="{{ url_for('register') }}" class="fw-bold text-decoration-none hover-primary">Create one</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
