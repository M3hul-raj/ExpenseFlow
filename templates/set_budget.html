t<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Budget</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-wallet" style="color: #4F46E5;"></i> Set Your Budget</h1>
        <div class="budget-form-container">
            <p class="budget-info">Set your monthly budget to track your spending progress. Your current budget is <strong>₹{{ "%.2f"|format(current_budget) }}</strong>.</p>

            <form method="POST" class="budget-form">
                <div class="form-row">
                    <div class="form-group">
                        <label for="month"><i class="fas fa-calendar-alt"></i> Month:</label>
                        <select id="month" name="month" required>
                            <option value="">Select Month</option>
                            {% for month_num, month_name in [('01', 'January'), ('02', 'February'), ('03', 'March'), ('04', 'April'), ('05', 'May'), ('06', 'June'), ('07', 'July'), ('08', 'August'), ('09', 'September'), ('10', 'October'), ('11', 'November'), ('12', 'December')] %}
                            <option value="{{ month_num }}" {% if month_num == current_month %}selected{% endif %}>{{ month_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="year"><i class="fas fa-calendar"></i> Year:</label>
                        <select id="year" name="year" required>
                            <option value="">Select Year</option>
                            {% for year in range(current_year-1, current_year+3) %}
                            <option value="{{ year }}" {% if year == current_year %}selected{% endif %}>{{ year }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="budget"><i class="fas fa-rupee-sign"></i> Monthly Budget Amount:</label>
                    <input type="number" step="0.01" id="budget" name="budget" placeholder="Enter budget amount" value="{{ "%.2f"|format(current_budget) }}" required min="0.01">
                </div>

                <div class="form-group">
                    <label for="recurring">
                        <input type="checkbox" name="recurring" id="recurring" value="1">
                        <i class="fas fa-repeat"></i> Set as recurring monthly budget
                    </label>
                </div>

                <button type="submit" class="btn-submit-budget">
                    <i class="fas fa-save"></i> Update Budget
                </button>
            </form>
        </div>

        <div class="budget-footer">
            <a href="{{ url_for('dashboard') }}" class="btn-back">
                <i class="fas fa-arrow-left"></i> Back to Dashboard
            </a>
        </div>
    </div>

    <style>
        .budget-form-container {
            background: #f8f9fa;
            padding: 2rem;
            border-radius: 15px;
            margin-bottom: 2rem;
            text-align: center;
        }

        .budget-info {
            color: #4a5568;
            margin-bottom: 2rem;
            font-size: 1.1rem;
            line-height: 1.6;
        }

        .budget-info strong {
            color: #4F46E5;
            font-size: 1.2rem;
        }

        .budget-form {
            max-width: 400px;
            margin: 0 auto;
        }

        .form-group {
            margin-bottom: 2rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #4a5568;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .form-group label i {
            margin-right: 0.5rem;
            color: #4F46E5;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1.2rem;
            text-align: center;
            transition: all 0.3s ease;
            background: white;
            box-sizing: border-box;
        }

        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .form-row .form-group {
            flex: 1;
            margin-bottom: 0;
        }

        @media (max-width: 768px) {
            .form-row {
                flex-direction: column;
                gap: 0;
            }

            .form-row .form-group {
                margin-bottom: 2rem;
            }
        }

        .btn-submit-budget {
            background: linear-gradient(45deg, #48bb78, #38a169);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-submit-budget:hover {
            background: linear-gradient(45deg, #38a169, #2f855a);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(72, 187, 120, 0.3);
        }

        .budget-footer {
            text-align: center;
        }

        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: #718096;
            text-decoration: none;
            font-weight: 500;
            padding: 0.75rem 1.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            color: #4a5568;
            border-color: #cbd5e0;
            background: #f7fafc;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .budget-form-container {
                padding: 1.5rem;
            }

            .form-group input {
                font-size: 1rem;
            }
        }
    </style>
</body>
</html>
