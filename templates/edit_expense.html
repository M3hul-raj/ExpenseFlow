{% extends "base.html" %}

{% block title %}Edit Expense - ExpenseFlow{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">

            <!-- Page Header -->
            <div class="d-flex align-items-center mb-4">
                <a href="{{ url_for('expenses.view_expense') }}" class="btn btn-light btn-sm rounded-pill me-3">
                    <i class="fas fa-arrow-left me-1"></i>Back
                </a>
                <div>
                    <h2 class="fw-bold mb-0" style="font-size: 1.4rem;"><i class="fas fa-pen text-primary me-2"></i>Edit Expense</h2>
                    <p class="text-secondary small mb-0">Update the details of your expense</p>
                </div>
            </div>

            <!-- Edit Form -->
            <div class="fintech-card">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="row g-3">
                        <!-- Date -->
                        <div class="col-sm-6">
                            <label for="date" class="form-label"><i class="fas fa-calendar-alt text-muted me-2"></i>Date</label>
                            <input type="date" class="form-control" id="date" name="date" value="{{ expense[0] }}" required>
                        </div>
                        <!-- Amount -->
                        <div class="col-sm-6">
                            <label for="amount" class="form-label"><i class="fas fa-rupee-sign text-muted me-2"></i>Amount (₹)</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" id="amount" name="amount" value="{{ expense[2] }}" required>
                        </div>
                        <!-- Category -->
                        <div class="col-sm-6">
                            <label for="category" class="form-label"><i class="fas fa-tags text-muted me-2"></i>Category</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="">Select category…</option>
                                {% for opt in ['Food', 'Transport', 'Shopping', 'Entertainment', 'Health', 'Utilities', 'Education', 'Travel', 'Personal Care', 'Home', 'Insurance', 'Other'] %}
                                <option value="{{ opt }}" {% if expense[1] == opt %}selected{% endif %}>{{ opt }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <!-- Payment Method -->
                        <div class="col-sm-6">
                            <label for="payment_method" class="form-label"><i class="fas fa-credit-card text-muted me-2"></i>Payment Method</label>
                            <select class="form-select" id="payment_method" name="payment_method" required>
                                <option value="">Select method…</option>
                                {% for m in ['Cash', 'UPI', 'Credit Card', 'Debit Card', 'Net Banking', 'Digital Wallet', 'Other'] %}
                                <option value="{{ m }}" {% if expense[4] == m %}selected{% endif %}>{{ m }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <!-- Description -->
                        <div class="col-12">
                            <label for="description" class="form-label"><i class="fas fa-sticky-note text-muted me-2"></i>Description <span class="text-muted">(optional)</span></label>
                            <textarea class="form-control" id="description" name="description" rows="2">{{ expense[3] }}</textarea>
                        </div>
                        <!-- Actions -->
                        <div class="col-12 pt-2">
                            <div class="d-flex gap-2 flex-wrap">
                                <button type="submit" class="btn btn-primary rounded-pill px-4 flex-grow-1">
                                    <i class="fas fa-save me-2"></i>Save Changes
                                </button>
                                <a href="{{ url_for('expenses.view_expense') }}" class="btn btn-light rounded-pill px-4">
                                    <i class="fas fa-times me-1"></i>Cancel
                                </a>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
